name: Build and Publish

on:
  push:
    branches: [ main, master ]  # Adjust if your default branch is different
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
      BUILD_CONFIGURATION: Release
      COGS_PYTHON: python
      COGS_NODE: node
      COGS_NPM: npm

    steps:
    - name: Calculate version (run_number + 550)
      id: version
      shell: pwsh
      run: |
        $number = [int]$env:GITHUB_RUN_NUMBER + 550
        echo "BUILD_VERSION=1.0.$number" >> $env:GITHUB_OUTPUT

    - name: Checkout repository
      uses: actions/checkout@v6.0.2
      with:
        fetch-depth: 0

    - name: Setup .NET 10 SDK
      uses: actions/setup-dotnet@v5.2.0
      with:
        dotnet-version: '10.0.x'  

    - name: Setup Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Setup Node 22
      uses: actions/setup-node@v6
      with:
        node-version: '22'

    - name: Display .NET version 
      run: dotnet --version

    - name: Cache NuGet packages
      uses: actions/cache@v5.0.5
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json', '**/*.csproj', '**/*.props', '**/*.targets') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore dependencies
      run: dotnet restore ./Cogs.Console.sln --verbosity minimal

    - name: Build solution 
      run: >
        dotnet build ./Cogs.Console.sln
        --configuration ${{ env.BUILD_CONFIGURATION }}
        --verbosity minimal
        --no-restore
        -p:Version=${{ steps.version.outputs.BUILD_VERSION }}
        -p:PackageVersion=${{ steps.version.outputs.BUILD_VERSION }}
        -p:AssemblyVersion=${{ steps.version.outputs.BUILD_VERSION }}
        -p:FileVersion=${{ steps.version.outputs.BUILD_VERSION }}
        -p:InformationalVersion=${{ steps.version.outputs.BUILD_VERSION }}

    - name: Run unit tests
      run: >
        dotnet test ./Cogs.Tests/Cogs.Tests.csproj
        --configuration ${{ env.BUILD_CONFIGURATION }}
        --no-build
        --no-restore
        --verbosity minimal

    - name: Generate integration fixtures
      shell: bash
      run: |
        rm -rf ./generated
        COGS_DLL=./Cogs.Console/bin/Release/net10.0/cogs.dll
        dotnet "$COGS_DLL" validate ./cogsburger
        dotnet "$COGS_DLL" publish-xsd --overwrite ./cogsburger ./generated/xsd
        dotnet "$COGS_DLL" publish-cs --overwrite --csproj --nullable ./cogsburger ./generated/src
        dotnet "$COGS_DLL" publish-py --overwrite ./cogsburger ./generated/python
        dotnet "$COGS_DLL" publish-ts --overwrite ./cogsburger ./generated/typescript
        dotnet "$COGS_DLL" publish-json --overwrite ./cogsburger ./generated/json
        dotnet "$COGS_DLL" publish-owl --overwrite ./cogsburger ./generated/owl

    - name: Build generated TypeScript package
      run: |
        npm --prefix ./generated/typescript install --ignore-scripts
        npm --prefix ./generated/typescript run build
        npm pack ./generated/typescript --dry-run

    - name: Restore integration tests
      run: dotnet restore ./Cogs.Tests.Integration/Cogs.Tests.Integration.csproj --verbosity minimal

    - name: Run integration tests
      run: >
        dotnet test ./Cogs.Tests.Integration/Cogs.Tests.Integration.csproj
        --configuration ${{ env.BUILD_CONFIGURATION }}
        --no-restore
        --verbosity minimal

    - name: Pack NuGet packages 
      run: >
        dotnet pack Cogs.Console/Cogs.Console.csproj
        --configuration ${{ env.BUILD_CONFIGURATION }}
        --no-build
        -o ./nupkg
        -p:Version=${{ steps.version.outputs.BUILD_VERSION }}
        -p:PackageVersion=${{ steps.version.outputs.BUILD_VERSION }}
        -p:AssemblyVersion=${{ steps.version.outputs.BUILD_VERSION }}
        -p:FileVersion=${{ steps.version.outputs.BUILD_VERSION }}
        -p:InformationalVersion=${{ steps.version.outputs.BUILD_VERSION }}
        -p:IncludeSymbols=true
        -p:SymbolPackageFormat=snupkg

    - name: Upload NuGet package as artifact (now only ONE package)
      uses: actions/upload-artifact@v7.0.1
      with:
        name: CogsNuGetPackage
        path: ./nupkg/*.nupkg
        if-no-files-found: error
